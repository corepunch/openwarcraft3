site_name: OpenWarcraft3
site_url: https://corepunch.github.io/openwarcraft3/
site_description: Open-source Warcraft III implementation using SDL2, running on Linux and macOS.
site_author: corepunch
repo_url: https://github.com/corepunch/openwarcraft3
repo_name: corepunch/openwarcraft3
edit_uri: edit/main/doc/
docs_dir: doc

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Games:
    - Warcraft III:
      - Overview: games/warcraft-3/readme.md
      - Docs Index: games/warcraft-3/docs/readme.md
      - File Formats:
        - 'Map (W3M/W3X)': games/warcraft-3/docs/file-formats/map.md
        - 'Model (MDX)': games/warcraft-3/docs/file-formats/mdx.md
        - 'SLK Spreadsheet': games/warcraft-3/docs/file-formats/slk.md
        - 'UI Frame Definition (FDF)': games/warcraft-3/docs/file-formats/fdf.md
      - Detailed File Notes:
        - Overview: games/warcraft-3/docs/file-docs/readme.md
        - MPQ Archive: games/warcraft-3/docs/file-docs/mpq.md
        - 'W3M / W3X Container': games/warcraft-3/docs/file-docs/w3x-w3m.md
        - Terrain W3E: games/warcraft-3/docs/file-docs/w3e.md
        - Doodads DOO: games/warcraft-3/docs/file-docs/doo.md
        - 'Shadow / Pathing': games/warcraft-3/docs/file-docs/shd-wpm.md
        - FDF Reference: games/warcraft-3/docs/file-docs/fdf.md
      - Implementation:
        - UI System: games/warcraft-3/docs/architecture/ui.md
        - UI Flow: games/warcraft-3/docs/architecture/ui-flow.md
        - UI Quick Reference: games/warcraft-3/docs/architecture/ui-quick-reference.md
        - Map Renderer: games/warcraft-3/docs/architecture/map-renderer.md
        - Ability Coverage: games/warcraft-3/docs/architecture/ability-coverage.md
        - ROC Ability Checklist: games/warcraft-3/docs/architecture/roc-ability-checklist.md
    - World of Warcraft:
      - Overview: games/world-of-warcraft/readme.md
      - Docs Index: games/world-of-warcraft/docs/readme.md
      - Data Loading: games/world-of-warcraft/docs/data-loading.md
