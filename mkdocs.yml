site_name: OpenWarcraft3
site_url: https://corepunch.github.io/openwarcraft3/
site_description: Open-source Warcraft III implementation using SDL2, running on Linux and macOS.
site_author: corepunch
repo_url: https://github.com/corepunch/openwarcraft3
repo_name: corepunch/openwarcraft3
edit_uri: edit/main/doc/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - File Formats:
    - 'Warcraft III Map (W3M/W3X)': file-formats/map.md
    - 'Warcraft III Model (MDX)': file-formats/mdx.md
    - 'SLK Spreadsheet': file-formats/slk.md
    - 'UI Frame Definition (FDF)': file-formats/fdf.md
    - 'StarCraft II Model (M3)': file-formats/m3.md
  - Architecture:
    - Client: architecture/client.md
    - Server: architecture/server.md
    - UI System: architecture/ui.md

markdown_extensions:
  - tables
  - fenced_code
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
