// OpenWarcraft3 default cvars.
// Loaded first; build-specific defaults, the generated config, and autoexec can override these.

seta fs_data ""
seta map ""
seta connect ""
seta r_module "renderer"
seta ui_module "ui"
seta g_module "game"
seta ui_start_route "/main"
seta net_enabled "1"
set com_frame_limit "0"
